# Cinema Slime — RSS reverse-proxy cache zone (http context).
#
# Install as: /etc/nginx/conf.d/cinemaslime-rss-cache.conf
# (nginx.conf already includes conf.d/*.conf inside the http{} block, which is
# the only context where proxy_cache_path is valid.)
#
# Pairs with the `location = /api/rss` block in the cinemaslime.com server
# (see docs/deploy/nginx-rss-proxy.md). Removes the three public CORS proxies
# from the Episode critical path: the browser fetches /api/rss same-origin and
# nginx serves it from this cache, hitting Anchor at most once per TTL.

proxy_cache_path /var/cache/nginx/rss
    levels=1:2
    keys_zone=rss_cache:1m
    max_size=50m
    inactive=60m
    use_temp_path=off;
