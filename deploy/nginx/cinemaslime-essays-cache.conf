# Cinema Slime — Essays reverse-proxy cache zone (http context).
#
# Install as: /etc/nginx/conf.d/cinemaslime-essays-cache.conf
# (nginx.conf already includes conf.d/*.conf inside the http{} block, which is
# the only context where proxy_cache_path is valid.)
#
# Pairs with the location blocks in cinemaslime-essays-location.conf.
# See docs/deploy/nginx-essays-proxy.md for the full installation playbook.
# Implements ADR 0008 — the same-origin, edge-cached Essays snapshot that amends
# ADR 0006 decision #6 ("Nostr stays client-side").

proxy_cache_path /var/cache/nginx/essays
    levels=1:2
    keys_zone=essays_cache:1m
    max_size=10m
    inactive=60m
    use_temp_path=off;
