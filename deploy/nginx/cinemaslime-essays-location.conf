# Cinema Slime — Essays reverse-proxy location blocks (server context).
#
# Paste both blocks inside the HTTPS `server { ... }` for cinemaslime.com in
# /etc/nginx/sites-available/cinemaslime.com (alongside `location / { ... }`).
# Requires the essays_cache zone from cinemaslime-essays-cache.conf.
#
# The browser fetches these same-origin paths rather than opening WebSocket
# relay connections on the critical paint path. nginx proxies to the nostr.band
# HTTP API, caches each JSON response for ~5 min, and serves the last-good copy
# when the upstream is unreachable. See docs/deploy/nginx-essays-proxy.md.
# Implements ADR 0008.
#
# Two resources are needed because the curation list (which Essays are official)
# and the essay bodies (kind:30023 content) are separate events on the relay.
# The client-side snapshot parser reads both and applies the curation gate.
#
# ── When a new essay author is added to the curation list ─────────────────────
# 1. Add the new author's hex pubkey to the `author:…` terms in the
#    /api/essays/events proxy_pass URL below.
# 2. Reload nginx: nginx -t && systemctl reload nginx
# This is the only change needed; the curation list itself is republished
# separately via `npm run publish:curation` (docs/curation-workflow.md).
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. Curation list: the brand's kind:30001 event that lists curated Essays ──
#
# Fixed query: one event, brand pubkey, d-tag "cinema-slime-essays".
# The URL is deterministic — it encodes the exact Nostr coordinate of the
# curation list event, which never changes even as the list contents are updated.
location = /api/essays/curation {
    proxy_pass https://api.nostr.band/v0/search/events?q=kind%3A30001+author%3A3fe7d91eb4133567db1ad7abab7ae308ebd9ae2d109601a7257e995035651365+%23d%3Acinema-slime-essays&limit=1;

    proxy_set_header Host api.nostr.band;
    proxy_ssl_server_name on;

    # nostr.band may set its own Cache-Control; ignore it so our short TTL governs.
    proxy_ignore_headers Cache-Control Expires Set-Cookie;

    proxy_cache essays_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_lock on;
    proxy_cache_background_update on;

    # Keep serving the last good copy when the upstream is flaky or down.
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin "*" always;

    # Surfaced for smoke-testing: MISS, then HIT, then STALE when upstream dies.
    add_header X-Cache-Status $upstream_cache_status always;
}

# ── 2. Essay bodies: kind:30023 long-form content by the curated authors ──────
#
# Author hex pubkeys are extracted from the `a` tag coordinates in the curation
# list (scripts/publish-curation.mjs ESSAYS). Currently two authors:
#   36220acef401d61af98054b669316ac0045adc12e463e618a7297f4098ffcbd0  (Scott)
#   2cfce0fc7e8f5e8e29a42427ed5903b9cd846e33ace7a7ab79f03ce28e3584e6  (Harrison)
# Add new pubkeys to the q= parameter when a new essay author joins the list.
location = /api/essays/events {
    proxy_pass https://api.nostr.band/v0/search/events?q=kind%3A30023+author%3A36220acef401d61af98054b669316ac0045adc12e463e618a7297f4098ffcbd0+author%3A2cfce0fc7e8f5e8e29a42427ed5903b9cd846e33ace7a7ab79f03ce28e3584e6&limit=100;

    proxy_set_header Host api.nostr.band;
    proxy_ssl_server_name on;

    proxy_ignore_headers Cache-Control Expires Set-Cookie;

    proxy_cache essays_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_lock on;
    proxy_cache_background_update on;

    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin "*" always;

    add_header X-Cache-Status $upstream_cache_status always;
}
