# Cinema Slime — llms.txt static-file location (server context).
#
# Paste this block inside the HTTPS `server { ... }` for cinemaslime.com in
# /etc/nginx/sites-available/cinemaslime.com (alongside `location / { ... }`).
#
# The site is a single-page app: `location / { ... }` falls back to index.html
# for any path, so without this exact-match block a request for /llms.txt would
# return the SPA shell instead of the file. `location = /llms.txt` is an exact
# match and takes priority over the prefix `location /`, so the static file in
# the build root (public/llms.txt is copied verbatim into the site root by Vite)
# is served directly.
#
# Assumes the site root is /var/www/cinemaslime/html (where `npm run build`
# output is deployed). Adjust `root` if the deploy path differs.

location = /llms.txt {
    root /var/www/cinemaslime/html;

    # Serve as UTF-8 markdown/plain text, not the SPA's text/html.
    default_type text/markdown;
    charset utf-8;

    # Public reference doc — let anyone (and any agent) fetch it cross-origin.
    add_header Access-Control-Allow-Origin "*" always;
}
