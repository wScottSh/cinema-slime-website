# Cinema Slime — RSS reverse-proxy location (server context).
#
# Paste this block inside the HTTPS `server { ... }` for cinemaslime.com in
# /etc/nginx/sites-available/cinemaslime.com (alongside `location / { ... }`).
# Requires the rss_cache zone from cinemaslime-rss-cache.conf.
#
# The browser fetches this same-origin path instead of racing public CORS
# proxies; nginx proxies to the Anchor feed, caches the response for ~5 min,
# and serves the last-good copy when Anchor is slow or down.

location = /api/rss {
    proxy_pass https://anchor.fm/s/1050fb0e4/podcast/rss;

    # SNI + correct vhost for Anchor's Fastly edge.
    proxy_set_header Host anchor.fm;
    proxy_ssl_server_name on;

    # Anchor sends Cache-Control: s-maxage=604834 (~7 days). Ignore it so our
    # own short TTL governs freshness against the 5–10 min staleness budget.
    proxy_ignore_headers Cache-Control Expires Set-Cookie;

    proxy_cache rss_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_lock on;
    proxy_cache_background_update on;

    # Keep serving the last good copy when upstream is flaky or down.
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # Same-origin now, but keep CORS open and avoid a duplicate header from
    # upstream (Anchor already sends Access-Control-Allow-Origin: *).
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin "*" always;

    # Surfaced for smoke-testing: MISS, then HIT, then STALE when upstream dies.
    add_header X-Cache-Status $upstream_cache_status always;
}
